<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Offline · Baseform</title>
    <link rel="icon" href="/icon.png" />
    <meta name="theme-color" content="#f97316" />
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: #fff9f2;
        color: #1f2937;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        text-align: center;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: #f97316;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        box-shadow: 0 8px 24px rgba(249, 115, 22, 0.25);
      }
      .icon svg { width: 36px; height: 36px; color: #fff; }
      h1 { font-size: 22px; font-weight: 900; margin: 0 0 8px; color: #111827; }
      p { font-size: 15px; color: #6b7280; margin: 0 0 24px; max-width: 320px; line-height: 1.5; }
      button {
        background: #f97316;
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 12px 20px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(249, 115, 22, 0.25);
      }
      button:active { transform: translateY(1px); }
      .hint { font-size: 12px; color: #9ca3af; margin-top: 20px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <h1>You&apos;re offline</h1>
      <p>Baseform needs a connection to sync your applications. Check your data or Wi-Fi and try again.</p>
      <button onclick="location.reload()">Try again</button>
      <p class="hint">Your saved data is safe — nothing was lost.</p>
    </div>
    <script>
      // Auto-retry when connection returns
      window.addEventListener("online", function () { location.reload(); });
    </script>
  </body>
</html>
